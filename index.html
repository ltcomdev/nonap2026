<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boldog Nőnapot! 💐</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .video-container {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .sound-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 20;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.6);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .sound-btn:hover {
            transform: scale(1.1);
            background: rgba(0, 0, 0, 0.7);
        }

        .sound-btn svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        .sound-btn .icon-unmute { display: none; }
        .sound-btn.unmuted .icon-mute { display: none; }
        .sound-btn.unmuted .icon-unmute { display: block; }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe
            id="vimeo-player"
            src="https://player.vimeo.com/video/1170693126?h=6af42ab1e2&background=1&autoplay=1&loop=1&muted=1&quality=1080p"
            allow="autoplay; fullscreen"
            allowfullscreen
        ></iframe>
    </div>

    <button class="sound-btn" id="soundBtn" title="Hang be/ki">
        <svg class="icon-mute" viewBox="0 0 24 24">
            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
        </svg>
        <svg class="icon-unmute" viewBox="0 0 24 24">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
    </button>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        const player = new Vimeo.Player(document.getElementById('vimeo-player'));
        const soundBtn = document.getElementById('soundBtn');
        let isMuted = true;

        player.setVolume(0);
        player.play().catch(() => {});

        soundBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            player.setVolume(isMuted ? 0 : 1);
            soundBtn.classList.toggle('unmuted', !isMuted);
        });
    </script>

</body>
</html>
