<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boldog Nőnapot! 💐</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .video-container {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .play-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .play-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-overlay h1 {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 3rem);
            margin-bottom: 2rem;
            text-align: center;
            padding: 0 1rem;
        }

        .play-btn {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.25);
        }

        .play-btn svg {
            width: 40px;
            height: 40px;
            fill: #fff;
            margin-left: 6px;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe
            id="vimeo-player"
            src="https://player.vimeo.com/video/1170693126?h=6af42ab1e2&background=1&autoplay=0&loop=1&muted=1&quality=1080p"
            allow="autoplay; fullscreen"
            allowfullscreen
        ></iframe>
    </div>

    <div class="play-overlay" id="overlay">
        <h1>Boldog Nőnapot! 💐</h1>
        <div class="play-btn">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        const iframe = document.getElementById('vimeo-player');
        const overlay = document.getElementById('overlay');
        const player = new Vimeo.Player(iframe);

        player.setVolume(0);
        player.play().catch(() => {});

        overlay.addEventListener('click', () => {
            overlay.classList.add('hidden');
            player.setVolume(1);
            player.setCurrentTime(0);
            player.play();

            if (iframe.requestFullscreen) {
                iframe.requestFullscreen().catch(() => {});
            }
        });
    </script>

</body>
</html>
